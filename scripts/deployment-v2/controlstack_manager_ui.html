<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ControlStack Service Manager Deployment v2</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f5f7fb; color: #182033; }
    main { max-width: 1120px; margin: 0 auto; padding: 32px 20px 48px; }
    header { display: flex; gap: 20px; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
    h1 { margin: 0 0 8px; font-size: clamp(1.7rem, 3vw, 2.4rem); }
    p { margin: 0; color: #566176; }
    a { color: #174ea6; }
    .card { background: white; border: 1px solid #dce2ec; border-radius: 14px; box-shadow: 0 10px 30px rgba(24, 32, 51, 0.06); }
    .controls { padding: 18px; display: grid; gap: 14px; margin-bottom: 20px; }
    .control-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    label { font-weight: 700; }
    select, button { min-height: 42px; border-radius: 9px; border: 1px solid #bcc6d6; background: white; padding: 0 14px; font: inherit; }
    select { min-width: 280px; }
    button { cursor: pointer; font-weight: 700; }
    button:hover { background: #eef3fb; }
    button:disabled { cursor: progress; opacity: 0.55; }
    button[data-action="stop"] { border-color: #c95b5b; }
    button[data-action="restart"] { border-color: #a76f18; }
    .status-line { min-height: 24px; font-weight: 700; }
    .status-line[data-kind="error"] { color: #a01f1f; }
    .status-line[data-kind="ok"] { color: #176b3a; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 14px 16px; border-bottom: 1px solid #e4e9f1; text-align: left; white-space: nowrap; }
    th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #657087; background: #f9fbfe; }
    tr:last-child td { border-bottom: 0; }
    .pill { display: inline-flex; align-items: center; min-width: 92px; justify-content: center; border-radius: 999px; padding: 5px 10px; font-size: 0.78rem; font-weight: 800; }
    .healthy { background: #e6f5ec; color: #146637; }
    .unhealthy { background: #fdeaea; color: #9d2525; }
    .managed { background: #e8f0fd; color: #244f91; }
    .external { background: #fff1d8; color: #82540d; }
    .stopped { background: #eef0f4; color: #5f6878; }
    .meta { display: grid; gap: 6px; font-size: 0.92rem; }
    code { background: #eef1f6; border-radius: 5px; padding: 2px 5px; }
    @media (max-width: 720px) { header { flex-direction: column; } select { width: 100%; min-width: 0; } .control-row { align-items: stretch; } button { flex: 1 1 42%; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>ControlStack Service Manager Deployment v2</h1>
        <p>Bounded loopback control for the canonical managed ControlStack services.</p>
      </div>
      <div class="meta">
        <span>Runtime shell: <a href="http://127.0.0.1:8788/workspace">127.0.0.1:8788/workspace</a></span>
        <span>Control UI: <code id="ui-url">loading…</code></span>
      </div>
    </header>

    <section class="card controls" aria-label="Service controls">
      <div class="control-row">
        <label for="service">Target</label>
        <select id="service" aria-label="Service target">
          <option value="all">All Services</option>
        </select>
      </div>
      <div class="control-row" id="buttons">
        <button type="button" data-action="status">Status</button>
        <button type="button" data-action="verify">Verify</button>
        <button type="button" data-action="start">Start</button>
        <button type="button" data-action="stop">Stop</button>
        <button type="button" data-action="restart">Restart</button>
      </div>
      <div id="message" class="status-line" role="status" aria-live="polite"></div>
    </section>

    <section class="card table-wrap">
      <table>
        <thead>
          <tr>
            <th>Service</th>
            <th>ID</th>
            <th>Port</th>
            <th>Health</th>
            <th>Managed state</th>
          </tr>
        </thead>
        <tbody id="services">
          <tr><td colspan="5">Loading service state…</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    const target = document.querySelector("#service");
    const buttons = [...document.querySelectorAll("button[data-action]")];
    const tbody = document.querySelector("#services");
    const message = document.querySelector("#message");
    document.querySelector("#ui-url").textContent = window.location.origin;

    function setBusy(busy) {
      for (const button of buttons) button.disabled = busy;
      target.disabled = busy;
    }

    function showMessage(text, kind = "") {
      message.textContent = text;
      message.dataset.kind = kind;
    }

    function pill(text, className) {
      const span = document.createElement("span");
      span.className = `pill ${className}`;
      span.textContent = text;
      return span;
    }

    function renderServices(services) {
      tbody.replaceChildren();
      const selected = target.value;
      const ids = new Set([...target.options].slice(1).map((option) => option.value));
      for (const service of services) {
        if (!ids.has(service.id)) {
          const option = document.createElement("option");
          option.value = service.id;
          option.textContent = `${service.name} (${service.port})`;
          target.append(option);
          ids.add(service.id);
        }
        const row = document.createElement("tr");
        const name = document.createElement("td");
        const id = document.createElement("td");
        const port = document.createElement("td");
        const health = document.createElement("td");
        const managed = document.createElement("td");
        name.textContent = service.name;
        id.textContent = service.id;
        port.textContent = String(service.port);
        health.append(pill(service.healthy ? "Healthy" : "Unhealthy", service.healthy ? "healthy" : "unhealthy"));
        managed.append(pill(service.managed ? "Managed" : (service.healthy ? "External" : "Stopped"), service.managed ? "managed" : (service.healthy ? "external" : "stopped")));
        row.append(name, id, port, health, managed);
        tbody.append(row);
      }
      if ([...target.options].some((option) => option.value === selected)) target.value = selected;
    }

    async function request(action = "status") {
      setBusy(true);
      showMessage(`${action[0].toUpperCase()}${action.slice(1)} in progress…`);
      try {
        const response = await fetch("/api/control", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action, serviceId: target.value }),
        });
        const payload = await response.json();
        if (!response.ok || !payload.ok) throw new Error(payload.error || "The bounded control operation failed.");
        renderServices(payload.services || []);
        const healthWarning = ["status", "verify", "start", "restart"].includes(action) && payload.verified === false;
        const suffix = healthWarning ? " Some selected services are not healthy or managed." : "";
        showMessage(`${action[0].toUpperCase()}${action.slice(1)} completed.${suffix}`, healthWarning ? "error" : "ok");
      } catch (error) {
        showMessage(error instanceof Error ? error.message : "The bounded control operation failed.", "error");
      } finally {
        setBusy(false);
      }
    }

    for (const button of buttons) button.addEventListener("click", () => request(button.dataset.action));
    request("status");
  </script>
</body>
</html>
