<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ControlStack Lab — Provenance Publication</title>
<link rel="stylesheet" href="./lab.css" />
<style>
  .publication-banner{padding:12px 16px;border:2px solid var(--warn,#9a6700);background:#fff7d6;color:#6f4d00;border-radius:10px;font-weight:800;letter-spacing:.04em;margin-bottom:14px}
  .publication-banner.governed{border-color:var(--info,#2b6cb0);background:#eef6ff;color:#174f86}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
  .kv{display:grid;grid-template-columns:minmax(130px,180px) 1fr;gap:5px 12px;font-size:12.5px}
  .kv .k{color:var(--text2,#4a5f6e)}
  .mono{font-family:var(--mono,monospace);overflow-wrap:anywhere}
  .state{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em}
  .state.fixture_only{background:#fff3cd;color:#765600}.state.unavailable{background:#f5f5f5;color:#666}.state.available{background:#e7f6ef;color:#116a48}
  table{width:100%;border-collapse:collapse}th,td{padding:7px 8px;border-bottom:1px solid var(--border-light,#ece8e2);text-align:left;vertical-align:top;font-size:12px}th{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--text3,#8a9aa5)}
  .error{border:1px solid var(--red,#d94040);background:#fff0f0;color:#8b1f1f;border-radius:8px;padding:12px}
  .unresolved{color:#8a6010}
</style>
</head>
<body>
<div class="wrap">
  <div class="brandhead">
    <div class="mark">CS</div>
    <div><div class="bn">CONTROLSTACK</div><div class="bs">Lab &amp; IES</div></div>
    <div class="pg"><div class="pgt">Provenance Publication</div><div class="pgs">read-only bounded projection</div></div>
  </div>
  <div id="app"></div>
</div>
<script type="module">
import {
  REFERENCE_IDENTITY_SCHEMA_ID,
  REFERENCE_IDENTITY_SCHEMA_VERSION,
  EVIDENCE_CAPABILITY_SCHEMA_ID,
  EVIDENCE_CAPABILITY_SCHEMA_VERSION,
  parseReferenceId,
  buildResolverPath,
  parseResolverPath,
  summariseEvidenceCapabilities,
} from "./nvbReference.js";

const VIEW_SCHEMA_ID = "controlstack.lab.provenance-publication-view.v1";
const VIEW_SCHEMA_VERSION = 1;
const FIXTURE_SCHEMA_ID = "controlstack.lab.fixture.reference.v1";
const FIXTURE_REFERENCE_PATH = "./lab/references/NVB-REF-OPT-000123/record.1mm.json";
const FIXTURE_EVIDENCE_PATH = "./lab/references/NVB-REF-OPT-000123/evidence/evidence.json";

const app = document.getElementById("app");
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]));
const deepFreeze = (value) => {
  if (!value || typeof value !== "object" || Object.isFrozen(value)) return value;
  for (const child of Object.values(value)) deepFreeze(child);
  return Object.freeze(value);
};
const isPlainObject = (value) => !!value && typeof value === "object" && !Array.isArray(value) && [Object.prototype, null].includes(Object.getPrototypeOf(value));
const exactKeys = (value, keys) => isPlainObject(value) && Object.keys(value).sort().join("|") === [...keys].sort().join("|");
const requireCondition = (condition, message) => { if (!condition) throw new Error(message); };
const requireNullAssembly = (value) => {
  requireCondition(exactKeys(value, ["emergency", "ewisCartridge"]), "Assembly verification shape is unsupported.");
  requireCondition(value.emergency === null && value.ewisCartridge === null, "Assembly verification must remain unresolved.");
};
const validatePath = (path) => {
  const descriptor = parseResolverPath(path);
  requireCondition(descriptor !== null, "A resolver path is not canonical.");
  requireCondition(buildResolverPath(descriptor) === path, "A resolver path does not round-trip.");
  return descriptor;
};

function validateIdentity(identity) {
  requireCondition(exactKeys(identity, ["schemaId","schemaVersion","referenceId","kind","serial","sealedAtUtc","authorityRecordSha256","referenceSha256","resolverPath","readOnly"]), "Governed identity shape is unsupported.");
  requireCondition(identity.schemaId === REFERENCE_IDENTITY_SCHEMA_ID && identity.schemaVersion === REFERENCE_IDENTITY_SCHEMA_VERSION, "Governed identity schema is unsupported.");
  const parsed = parseReferenceId(identity.referenceId);
  requireCondition(parsed && parsed.kind === identity.kind && parsed.serial === identity.serial, "Governed identity fields conflict.");
  requireCondition(identity.resolverPath === buildResolverPath({kind:"reference", referenceId:identity.referenceId}), "Governed identity path conflicts.");
  requireCondition(/^[0-9a-f]{64}$/.test(identity.authorityRecordSha256) && /^[0-9a-f]{64}$/.test(identity.referenceSha256), "Governed identity SHA values are malformed.");
  requireCondition(typeof identity.sealedAtUtc === "string" && identity.readOnly === true, "Governed identity is incomplete.");
}

function validateFixture(fixture) {
  const keys = ["schemaId","schemaVersion","fixtureStatus","productionAuthority","referenceId","referenceKind","resolverPath","provenancePath","originIesRef","evidenceIndexRef","reportRefs","parentReferenceRefs","componentRefs","authorityRecordSha256","referenceSha256","approvalState","photometryStatus","assemblyVerification","unresolvedFields","note"];
  requireCondition(exactKeys(fixture, keys), "Fixture projection is incomplete or has unsupported fields.");
  requireCondition(fixture.schemaId === FIXTURE_SCHEMA_ID && fixture.schemaVersion === 1, "Fixture schema is unsupported.");
  requireCondition(fixture.fixtureStatus === "offline_demo_unapproved" && fixture.productionAuthority === false && fixture.approvalState === "fixture_only", "Fixture authority flags conflict.");
  const parsed = parseReferenceId(fixture.referenceId);
  requireCondition(parsed && parsed.kind === fixture.referenceKind, "Fixture identity fields conflict.");
  requireCondition(fixture.resolverPath === buildResolverPath({kind:"reference", referenceId:fixture.referenceId}), "Fixture reference path conflicts.");
  requireCondition(fixture.provenancePath === buildResolverPath({kind:"provenance", referenceId:fixture.referenceId}), "Fixture provenance path conflicts.");
  requireCondition(typeof fixture.originIesRef === "string" && typeof fixture.evidenceIndexRef === "string", "Fixture artifact references are unresolved.");
  for (const path of [fixture.originIesRef, fixture.evidenceIndexRef, ...fixture.reportRefs, ...fixture.parentReferenceRefs, ...fixture.componentRefs]) validatePath(path);
  requireCondition(fixture.authorityRecordSha256 === null && fixture.referenceSha256 === null, "Fixture SHA values must remain unresolved.");
  requireNullAssembly(fixture.assemblyVerification);
  requireCondition(Array.isArray(fixture.unresolvedFields) && fixture.unresolvedFields.every((value) => typeof value === "string"), "Fixture unresolved fields are malformed.");
}

function validateCapabilitySummary(summary, referenceId) {
  if (summary === null) return;
  requireCondition(summary.schemaId === EVIDENCE_CAPABILITY_SCHEMA_ID && summary.schemaVersion === EVIDENCE_CAPABILITY_SCHEMA_VERSION, "Evidence capability schema is unsupported.");
  requireCondition(summary.referenceId === referenceId && summary.readOnly === true, "Evidence capability identity conflicts.");
  requireNullAssembly(summary.assemblyVerification);
}

function validateResolverEntries(entries, mode) {
  requireCondition(Array.isArray(entries), "Resolver entries must be an array.");
  const stateByPath = new Map();
  const normalized = entries.map((entry) => {
    requireCondition(exactKeys(entry, ["label","descriptor","path","state"]), "Resolver entry shape is unsupported.");
    requireCondition(typeof entry.label === "string" && entry.label.length > 0, "Resolver entry label is required.");
    const built = buildResolverPath(entry.descriptor);
    requireCondition(entry.path === built, "Resolver entry path conflicts with its descriptor.");
    const parsed = parseResolverPath(entry.path);
    requireCondition(parsed !== null && JSON.stringify(parsed) === JSON.stringify(entry.descriptor), "Resolver entry does not round-trip.");
    requireCondition(["available","unavailable","fixture_only"].includes(entry.state), "Resolver entry state is unsupported.");
    requireCondition(mode === "governed" || entry.state !== "available", "Fixture mode cannot mark a path available.");
    const prior = stateByPath.get(entry.path);
    requireCondition(prior === undefined || prior === entry.state, "Duplicate resolver path states conflict.");
    stateByPath.set(entry.path, entry.state);
    return {...entry, descriptor:{...entry.descriptor}};
  });
  return normalized.sort((a,b) => a.path.localeCompare(b.path) || a.label.localeCompare(b.label));
}

function validateView(view) {
  requireCondition(exactKeys(view, ["schemaId","schemaVersion","publicationMode","referenceIdentity","fixtureReference","resolverEntries","evidenceCapabilities","unresolvedFields","assemblyVerification","readOnly"]), "Publication view shape is unsupported.");
  requireCondition(view.schemaId === VIEW_SCHEMA_ID && view.schemaVersion === VIEW_SCHEMA_VERSION && view.readOnly === true, "Publication view schema is unsupported.");
  requireCondition(["governed","offline_fixture"].includes(view.publicationMode), "Publication mode is unsupported.");
  requireCondition((view.referenceIdentity === null) !== (view.fixtureReference === null), "Exactly one identity projection is required.");
  if (view.publicationMode === "governed") {
    requireCondition(view.fixtureReference === null, "Governed mode cannot contain a fixture projection.");
    validateIdentity(view.referenceIdentity);
  } else {
    requireCondition(view.referenceIdentity === null, "Fixture mode cannot contain a governed identity.");
    validateFixture(view.fixtureReference);
  }
  const referenceId = view.referenceIdentity?.referenceId || view.fixtureReference?.referenceId;
  validateCapabilitySummary(view.evidenceCapabilities, referenceId);
  requireCondition(Array.isArray(view.unresolvedFields) && view.unresolvedFields.every((value) => typeof value === "string"), "Publication unresolved fields are malformed.");
  requireNullAssembly(view.assemblyVerification);
  return deepFreeze({...view, resolverEntries:validateResolverEntries(view.resolverEntries, view.publicationMode)});
}

function descriptorLabel(path) {
  const descriptor = validatePath(path);
  const names = {reference:"Reference projection", provenance:"Provenance projection", originIes:"Origin IES reference", evidence:"Evidence index reference", report:"Report reference", component:"Component reference", source:"Source reference"};
  return {label:names[descriptor.kind], descriptor, path, state:"fixture_only"};
}

async function buildOfflineView() {
  const [fixtureResponse, evidenceResponse] = await Promise.all([fetch(FIXTURE_REFERENCE_PATH), fetch(FIXTURE_EVIDENCE_PATH)]);
  requireCondition(fixtureResponse.ok && evidenceResponse.ok, "The committed fixture projection could not be loaded.");
  const fixture = await fixtureResponse.json();
  const evidenceIndex = await evidenceResponse.json();
  requireCondition(evidenceIndex.schemaId === "controlstack.lab.fixture.evidence-index.v1" && evidenceIndex.fixtureStatus === "offline_demo_unapproved" && evidenceIndex.productionAuthority === false, "Fixture evidence index is unsupported.");
  requireCondition(evidenceIndex.referenceId === fixture.referenceId && Array.isArray(evidenceIndex.entries), "Fixture evidence index conflicts with the reference.");
  const evidenceCapabilities = summariseEvidenceCapabilities({
    referenceId: fixture.referenceId,
    entries: evidenceIndex.entries.map(({evidenceType,status}) => ({evidenceType,status})),
  });
  const paths = [fixture.resolverPath, fixture.provenancePath, fixture.originIesRef, fixture.evidenceIndexRef, ...fixture.reportRefs, ...fixture.parentReferenceRefs, ...fixture.componentRefs];
  return validateView({
    schemaId: VIEW_SCHEMA_ID,
    schemaVersion: VIEW_SCHEMA_VERSION,
    publicationMode: "offline_fixture",
    referenceIdentity: null,
    fixtureReference: fixture,
    resolverEntries: paths.map(descriptorLabel),
    evidenceCapabilities,
    unresolvedFields: [...fixture.unresolvedFields],
    assemblyVerification: {emergency:null, ewisCartridge:null},
    readOnly: true,
  });
}

function kvRows(rows) {
  return `<div class="kv">${rows.map(([key,value,klass=""]) => `<div class="k">${esc(key)}</div><div class="${klass}">${value}</div>`).join("")}</div>`;
}
function render(view) {
  const fixture = view.fixtureReference;
  const identity = view.referenceIdentity;
  const isFixture = view.publicationMode === "offline_fixture";
  const referenceId = fixture?.referenceId || identity.referenceId;
  const banner = isFixture ? "OFFLINE DEMO — UNAPPROVED" : "GOVERNED SAFE PROJECTION";
  const identityRows = isFixture
    ? [["Reference ID",esc(referenceId),"mono"],["Kind",esc(fixture.referenceKind)],["Approval state",esc(fixture.approvalState),"mono"],["Photometry status",esc(fixture.photometryStatus),"mono"],["Authority SHA","unresolved","mono unresolved"],["Reference SHA","unresolved","mono unresolved"]]
    : [["Reference ID",esc(referenceId),"mono"],["Kind",esc(identity.kind)],["Seal time",esc(identity.sealedAtUtc),"mono"],["Authority SHA",esc(identity.authorityRecordSha256),"mono"],["Reference SHA",esc(identity.referenceSha256),"mono"]];
  const capabilities = view.evidenceCapabilities?.capabilities || [];
  app.innerHTML = `
    <div class="publication-banner ${isFixture?"":"governed"}">${banner}</div>
    <div class="grid">
      <div class="card"><h2>Identity projection</h2>${kvRows(identityRows)}</div>
      <div class="card"><h2>Assembly verification</h2>${kvRows([["Emergency","unresolved","unresolved"],["EWIS cartridge","unresolved","unresolved"]])}</div>
    </div>
    <div class="card"><h2>Resolver publication entries</h2>
      <table><thead><tr><th>Label</th><th>Canonical host-free path</th><th>State</th></tr></thead><tbody>
      ${view.resolverEntries.map((entry) => `<tr><td>${esc(entry.label)}</td><td class="mono">${esc(entry.path)}</td><td><span class="state ${entry.state}">${esc(entry.state.replace("_"," "))}</span></td></tr>`).join("")}
      </tbody></table>
    </div>
    <div class="card"><h2>Evidence category coverage</h2>
      ${capabilities.length ? `<table><thead><tr><th>Capability</th><th>Coverage</th><th>Missing categories</th></tr></thead><tbody>${capabilities.map((row) => `<tr><td class="mono">${esc(row.capabilityId)}</td><td>${esc(row.state)}</td><td class="mono">${esc(row.missingEvidenceTypes.join(", ") || "none")}</td></tr>`).join("")}</tbody></table>` : `<p class="unresolved">Evidence category coverage is unresolved.</p>`}
      <p class="muted">Coverage describes evidence categories only. It does not establish emergency or EWIS assembly verification.</p>
    </div>
    <div class="card"><h2>Unresolved fields</h2><div class="mono unresolved">${esc(view.unresolvedFields.join(" · ") || "none")}</div></div>`;
}

try {
  const supplied = globalThis.CONTROLSTACK_PROVENANCE_PUBLICATION_VIEW;
  const view = supplied === undefined ? await buildOfflineView() : validateView(supplied);
  render(view);
} catch (error) {
  app.innerHTML = `<div class="error"><b>Publication blocked.</b><div>${esc(error instanceof Error ? error.message : "Unsupported publication input.")}</div><div class="muted">No partial identity, route, evidence or authority data is displayed.</div></div>`;
}
</script>
</body>
</html>
